name: Ignis Studio macOS Signed

on:
  workflow_dispatch:

jobs:
  build-signed-dmg:
    runs-on: macos-latest

    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      IGNIS_NOTARIZE: "0"
      DEBUG: "electron-builder,@electron/notarize*"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check Electron main process
        run: npm run check:main

      - name: Check macOS image resizer
        run: node --check src/js/resizer.js

      - name: Prepare App Store Connect API key
        if: env.APPLE_API_KEY_BASE64 != ''
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Check signing and notarization secrets
        run: node scripts/check-mac-signing-env.js

      - name: Build signed universal DMG
        timeout-minutes: 45
        env:
          APPLE_API_KEY: ""
          APPLE_API_KEY_BASE64: ""
          APPLE_API_KEY_ID: ""
          APPLE_API_ISSUER: ""
        run: npx electron-builder --mac dmg --universal --publish never --config.mac.notarize=false

      - name: Verify packaged app contents
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find out/installer -name 'Ignis Studio 3.1.app' -print -quit)"
          DMG_PATH="$(find out/installer -name '*.dmg' -print -quit)"
          test -n "$APP_PATH"
          test -n "$DMG_PATH"
          test -f "$APP_PATH/Contents/Info.plist"
          test -x "$APP_PATH/Contents/MacOS/Ignis Studio 3.1"
          test -f "$APP_PATH/Contents/Resources/app/src/index.js"
          test -f "$APP_PATH/Contents/Resources/app/src/js/resizer.js"
          test -f "$APP_PATH/Contents/Resources/app/src/img/icon.icns"
          test -f "$APP_PATH/Contents/Resources/app/package.json"
          test -d "$APP_PATH/Contents/Resources/app/node_modules"
          echo "Packaged app: $APP_PATH"
          echo "Packaged DMG: $DMG_PATH"
          echo "Packaged source files: $(find "$APP_PATH/Contents/Resources/app/src" -type f | wc -l | tr -d ' ')"
          plutil -p "$APP_PATH/Contents/Info.plist" | grep -E 'CFBundleIdentifier|CFBundleName|CFBundleDisplayName|CFBundleDocumentTypes' || true
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Notarize and staple DMG
        timeout-minutes: 125
        shell: bash
        run: |
          set -euo pipefail
          DMG_PATH="$(find out/installer -name '*.dmg' -print -quit)"
          test -n "$DMG_PATH"
          echo "Submitting DMG for notarization: $DMG_PATH"
          xcrun notarytool submit "$DMG_PATH" \
            --key "$APPLE_API_KEY" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait \
            --timeout 120m
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Verify macOS signature and notarization
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find out/installer -name 'Ignis Studio 3.1.app' -print -quit)"
          DMG_PATH="$(find out/installer -name '*.dmg' -print -quit)"
          test -n "$APP_PATH"
          test -n "$DMG_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH"
          spctl -a -t open --context context:primary-signature -v "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          echo "DMG built at: $DMG_PATH"

      - name: Upload signed DMG
        uses: actions/upload-artifact@v4
        with:
          name: Ignis-Studio-3.1.0-macOS-universal-signed-notarized-DMG
          path: out/installer/*.dmg
          if-no-files-found: error

      - name: Upload signed macOS app archive
        uses: actions/upload-artifact@v4
        with:
          name: Ignis-Studio-3.1.0-macOS-universal-signed-app
          path: out/installer/mac*/Ignis Studio 3.1.app
          if-no-files-found: ignore

name: Ignis Studio macOS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "**"

jobs:
  build-dmg:
    runs-on: macos-latest

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check Electron main process
        run: npm run check:main

      - name: Check macOS image resizer
        run: node --check src/js/resizer.js

      - name: Build macOS universal DMG
        run: npm run installer:mac:universal

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Ignis-Studio-3.1.0-macOS-universal-DMG
          path: out/installer/*.dmg
          if-no-files-found: error

      - name: Upload macOS app archive
        uses: actions/upload-artifact@v4
        with:
          name: Ignis-Studio-3.1.0-macOS-unpacked
          path: out/installer/mac*/Ignis Studio 3.1.app
          if-no-files-found: ignore
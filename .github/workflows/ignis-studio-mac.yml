name: Ignis Studio macOS

on:
  workflow_dispatch:
  push:
    paths:
      - "**"

jobs:
  build-dmg:
    runs-on: macos-latest

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check Electron main process
        run: npm run check:main

      - name: Build macOS DMG
        run: npm run installer:mac:arm64

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Ignis-Studio-macOS-Apple-Silicon-DMG
          path: out/installer/*.dmg
          if-no-files-found: error

      - name: Upload macOS app archive
        uses: actions/upload-artifact@v4
        with:
          name: Ignis-Studio-macOS-unpacked
          path: out/installer/mac*/Ignis Studio.app
          if-no-files-found: ignore
